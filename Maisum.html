<!DOCTYPE html>
<html>
<head>
    <title>Polo - Maisum Abbas</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            padding: 80px 20px;
        }

        h1 {
            font-size: 55px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 8px black;
        }

        h2 {
            color: gold;
            font-size: 32px;
        }

        p {
            font-size: 22px;
            width: 70%;
            margin: auto;
            line-height: 1.7;
        }

        .card {
            background: rgba(255,255,255,0.12);
            margin: 40px auto;
            width: 70%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 35px;
            background: gold;
            color: black;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            transform: scale(1.08);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>POLO</h1>
        <h2>Presented by Maisum Abbas</h2>

        <div class="card">
            <p>
                Polo is known as the sport of kings. It is a fast and exciting game
                played on horseback where players use mallets to hit a ball into the goal.
                It requires speed, teamwork, balance, and skill.
            </p>

            <a href="#" class="btn">Explore Polo</a>
        </div>
    </div>

</body>
</html>
