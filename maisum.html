<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Polo - Maisum Abbas</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1609947017136-9daf32a5eb16?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
            color: white;
            text-align: center;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            min-height: 100vh;
            padding: 60px 20px;
        }

        h1 {
            font-size: 60px;
            margin-top: 50px;
            text-shadow: 2px 2px 10px black;
        }

        h2 {
            color: gold;
            font-size: 30px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            width: 70%;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        p {
            font-size: 20px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: gold;
            color: black;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<div class="overlay">

    <h1>🏇 POLO</h1>
    <h2>Made by Maisum Abbas</h2>

    <div class="box">
        <p>
            Polo is a fast and exciting sport played on horses. 
            It is known as the "Game of Kings" because of its history and royal connection. 
            Players use mallets to hit a ball into the opponent's goal.
        </p>

        <a class="btn" href="#">Learn More</a>
    </div>

</div>

</body>
</html>
