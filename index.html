<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polo Team</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
        color: white;
        text-align: center;
    }

    .header {
        background: rgba(0,0,0,0.4);
        padding: 30px;
        font-size: 36px;
        font-weight: bold;
        letter-spacing: 2px;
    }

    .container {
        margin: 40px auto;
        width: 80%;
        background: rgba(255,255,255,0.1);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
        color: #ffd700;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        background: rgba(255,255,255,0.15);
        margin: 10px;
        padding: 12px;
        border-radius: 10px;
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;
        background: #ffd700;
        color: black;
        text-decoration: none;
        border-radius: 30px;
        font-weight: bold;
    }

    .btn:hover {
        background: white;
    }
</style>
</head>

<body>

<div class="header">
    🐎 Polo Champions Club 🏆
</div>

<div class="container">
    <h2>About Our Team</h2>
    <p>We are passionate polo players known for speed, teamwork, and skill.</p>

    <h2>Team Members</h2>
    <ul>
        <li>Captain - Ali Khan</li>
        <li>Player 2 - Ahmed</li>
        <li>Player 3 - Hassan</li>
        <li>Player 4 - Usman</li>
    </ul>

    <h2>Achievements</h2>
    <p>🏆 National Polo Championship Winner</p>
    <p>🏆 Best Team Award 2025</p>

    <a href="#" class="btn">Join Team</a>
</div>

</body>
</html>
